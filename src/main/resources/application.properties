# POOLER URL (IPv4 üzerinden, engelsiz bağlantı)
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0

# KULLANICI ADI: Pooler kullanırken kullanıcı adı genelde 'postgres.proje-id' formatındadır.
# 'rpugcpclwembabwebrxy' kısmının senin proje id'n olduğundan emin ol.
spring.datasource.username=postgres.rpugcpclwembabwebrxy

# ŞİFRE: Supabase veritabanı şifreni buraya direkt yaz (Örn: spring.datasource.password=Sifren123)
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate & JPA Ayarları
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect